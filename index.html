<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BuzzStock DEBUG</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06091a;color:#dde5f6;font-family:'Outfit',sans-serif;font-size:14px}
.container{padding:20px;max-width:600px;margin:0 auto}
.card{background:#0c1226;border:1px solid #1c2d4a;border-radius:10px;padding:15px;margin-bottom:15px}
.metric{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.label{font-size:10px;color:#3b5070;text-transform:uppercase;font-weight:700}
.value{font-size:14px;font-weight:700;font-family:'Space Mono',monospace}
.ok{color:#0ece87}.bad{color:#f43f5e}.na{color:#7994bc}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const FINNHUB_KEY = 'd7taikhr01qugn09v5tgd7taikhr01qugn09v5u0';
const FINNHUB = 'https://finnhub.io/api/v1';

async function fhGet(path){
  const sep=path.includes('?')?'&':'?';
  const url=`${FINNHUB}${path}${sep}token=${FINNHUB_KEY}`;
  try{
    const r=await fetch(url);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }catch(e){
    console.error('FH API Error:', url, e);
    return null;
  }
}

function DebugApp(){
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  
  useEffect(() => {
    (async () => {
      console.log('Fetching AAPL quote...');
      const q = await fhGet(`/quote?symbol=AAPL`);
      console.log('Quote:', q);
      
      console.log('Fetching AAPL profile...');
      const p = await fhGet(`/stock/profile2?symbol=AAPL`);
      console.log('Profile:', p);
      
      console.log('Fetching AAPL metrics...');
      const m = await fhGet(`/stock/metric?symbol=AAPL&metric=all`);
      console.log('Metrics:', m);
      
      console.log('Fetching AAPL institutional ownership...');
      const own = await fhGet(`/stock/institutional-ownership?symbol=AAPL`);
      console.log('Ownership:', own);
      
      setData({q,p,m:m?.metric||{},own:own?.ownership||[]});
      setLoading(false);
    })();
  }, []);
  
  if(loading) return <div className="container"><div className="card">Loading AAPL data...</div></div>;
  if(!data) return <div className="container"><div className="card bad">Failed to load data</div></div>;
  
  const {q,p,m,own} = data;
  
  return <div className="container">
    <div className="card">
      <div style={{fontSize:18,fontWeight:700,marginBottom:10}}>AAPL DEBUG DATA</div>
      
      <div style={{fontSize:12,fontWeight:700,marginBottom:10}}>QUOTE</div>
      <div className="metric">
        <div><div className="label">Price</div><div className="value ok">${q.c?.toFixed(2)||'—'}</div></div>
        <div><div className="label">Change %</div><div className="value">{q.dp?.toFixed(2)||'—'}%</div></div>
      </div>
      
      <div style={{fontSize:12,fontWeight:700,marginTop:20,marginBottom:10}}>PROFILE</div>
      <div style={{fontSize:11,color:'#7994bc'}}>{p.name} • {p.finnhubIndustry}</div>
      
      <div style={{fontSize:12,fontWeight:700,marginTop:20,marginBottom:10}}>METRICS (Top 20 Available)</div>
      {Object.entries(m).slice(0,20).map(([k,v])=>(
        <div key={k} style={{fontSize:11,padding:8,borderBottom:'1px solid #1c2d4a'}}>
          <div className="label">{k}</div>
          <div className="value na">{v!==null&&v!==undefined?v.toString():'NULL'}</div>
        </div>
      ))}
      
      <div style={{fontSize:12,fontWeight:700,marginTop:20,marginBottom:10}}>INSTITUTIONAL HOLDERS</div>
      {own.slice(0,5).map((h,i)=>(
        <div key={i} style={{fontSize:11,padding:8,borderBottom:'1px solid #1c2d4a'}}>
          <div>{h.name}</div>
          <div className="value ok">{h.change?.toLocaleString()||0} shares</div>
        </div>
      ))}
      <div style={{fontSize:10,color:'#3b5070',marginTop:10}}>Total holders: {own.length}</div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<DebugApp/>);
</script>
</body>
</html>
