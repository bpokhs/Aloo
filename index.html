const { useState, useRef, useEffect, useCallback } = React;

const FINNHUB_KEY = 'd7taikhr01qugn09v5tgd7taikhr01qugn09v5u0';
const FINNHUB = 'https://finnhub.io/api/v1';
const REFRESH_SEC = 60;
// Fallback watchlist — replaced by live StockTwits trending on load
const DEFAULT_WATCHLIST = ['NVDA','AAPL','TSLA','AMD','META','MSFT','PLTR','AMZN','GOOGL','GME'];
const SICONS = {'All':'⚡','Semiconductors':'🔬','Technology':'💻','Consumer Electronics':'📱','Software':'💻','Internet Content & Information':'🌐','Software—Application':'💻','Data Analytics':'📊','E-Commerce':'☁️','Auto Manufacturers':'🚗','Specialty Retail':'🎮','Unknown':'📈'};

async function fhGet(path){
  const sep=path.includes('?')?'&':'?';
  const r=await fetch(`${FINNHUB}${path}${sep}token=${FINNHUB_KEY}`);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── StockTwits social trending (no key needed, CORS proxy) ──────────
async function fetchSocialTrending(){
  try{
    const proxy='https://api.allorigins.win/raw?url=';
    const target=encodeURIComponent('https://api.stocktwits.com/api/2/trending/symbols.json');
    const r=await fetch(proxy+target,{signal:AbortSignal.timeout(7000)});
    if(!r.ok) throw new Error('StockTwits fetch failed');
    const data=await r.json();
    const symbols=(data.symbols||[])
      .filter(s=>s.symbol&&/^[A-Z]{1,5}$/.test(s.symbol)) // US tickers only
      .slice(0,15);
    if(symbols.length<5) return null;
    return symbols.map(s=>({
      ticker:s.symbol,
      mentions:s.watchlist_count&&s.watchlist_count>0?s.watchlist_count:null,
    }));
  }catch(e){
    console.warn('StockTwits unavailable, using default watchlist');
    return null;
  }
}

async function fetchStock(ticker){
  const [quote,profile,metrics]=await Promise.allSettled([
    fhGet(`/quote?symbol=${ticker}`),
    fhGet(`/stock/profile2?symbol=${ticker}`),
    fhGet(`/stock/metric?symbol=${ticker}&metric=all`),
  ]);
  return {
    q: quote.status==='fulfilled'?quote.value:{},
    p: profile.status==='fulfilled'?profile.value:{},
    m: metrics.status==='fulfilled'?(metrics.value?.metric||{}):{},
  };
}

function teq(m){return Math.max((m.bookValuePerShareAnnual||1)*(m.shareOutstanding||1),1);}
// ── Everything Money 8 Pillars (exact criteria) ──────────────────────
function calcPillars(m){
  // All Finnhub values: freeCashFlowPerShareTTM in $/sh, shareOutstanding in millions, totalDebt & marketCap in $M
  // So FCF total = $/sh * M shares = $M ← same unit as totalDebt and marketCap ✓
  const fcfTotal=(m.freeCashFlowPerShareTTM||0)*(m.shareOutstanding||0); // $M
  const debtFcfRatio=fcfTotal>0?(m.totalDebt||0)/fcfTotal:999;
  const pFcf=fcfTotal>0?(m.marketCapitalization||0)/fcfTotal:999;
  const sharesFlat=(m.shareOutstanding||0)<=(m.shareOutstandingPriorYear||m.shareOutstanding||1)*1.005;
  const checks=[
    {name:'P/E Ratio < 22.5',   passed:(m.peBasicExclExtraTTM||999)>0&&(m.peBasicExclExtraTTM||999)<22.5, value:m.peBasicExclExtraTTM?m.peBasicExclExtraTTM.toFixed(1)+'x':'—',   comment:'Reasonable price relative to earnings'},
    {name:'ROIC > 10%',         passed:(m.roicAnnual||0)>10,                                               value:`${(m.roicAnnual||0).toFixed(1)}%`,                                  comment:'Management efficiently uses invested capital'},
    {name:'Revenue Growth',     passed:(m.revenueGrowthQuarterlyYoy||0)>0,                                 value:`${(m.revenueGrowthQuarterlyYoy||0).toFixed(1)}%`,                   comment:'Revenue growing year-over-year'},
    {name:'EPS / Net Income ↑', passed:(m.epsBasicExclExtraItemsTTM||0)>0&&(m.netProfitMarginAnnual||0)>0,value:m.epsBasicExclExtraItemsTTM?`$${m.epsBasicExclExtraItemsTTM.toFixed(2)}`:'—', comment:'Positive and growing earnings'},
    {name:'Shares Flat or ↓',   passed:sharesFlat,                                                         value:m.shareOutstanding?`${(m.shareOutstanding).toFixed(0)}M sh`:'—',   comment:'No shareholder dilution'},
    {name:'Debt < 5yr FCF',     passed:debtFcfRatio<5,                                                     value:debtFcfRatio<900?debtFcfRatio.toFixed(1)+'yr':'N/A',                 comment:'Long-term debt repayable in under 5 years of FCF'},
    {name:'Free Cash Flow > 0', passed:(m.freeCashFlowPerShareTTM||0)>0,                                   value:m.freeCashFlowPerShareTTM?`$${m.freeCashFlowPerShareTTM.toFixed(2)}/sh`:'—', comment:'Company generates real cash after capex'},
    {name:'Price / FCF < 20',   passed:pFcf<20,                                                            value:pFcf<900?pFcf.toFixed(1)+'x':'N/A',                                 comment:'Not overpaying relative to free cash flow'},
  ];
  const score=checks.filter(c=>c.passed).length;
  return{pillars:checks,totalScore:score,grade:score>=7?'A':score>=6?'B':score>=4?'C':score>=2?'D':'F'};
}
function calcDCF(m,price){
  const safe=n=>(isFinite(n)&&!isNaN(n)?n:0);
  if(!price||!m.shareOutstanding||price<=0)return{intrinsic:null,upside:null,rating:'N/A',wacc:10,revGrowth:0,fcfMargin:0};
  const beta=safe(m.beta)||1.2;
  const wacc=Math.max(parseFloat((4.5+beta*5.5).toFixed(1)),6);
  const shares=safe(m.shareOutstanding);
  const revG=Math.min(Math.max(safe(m.revenueGrowthQuarterlyYoy)||safe(m.epsGrowthQuarterlyYoy)||5,-20),35);
  let fcfM=Math.min(Math.max(safe(m.freeCashFlowMarginAnnual)||safe(m.netProfitMarginAnnual)||10,-50),80);
  
  // PRIMARY: FCF/share × shares
  let fcf=safe(m.freeCashFlowPerShareTTM)*shares/1e3;
  if(fcf>0){
    fcfM=safe(m.freeCashFlowMarginAnnual)||safe(m.netProfitMarginAnnual)||10;
  }else{
    // FALLBACK 1: revenue × FCF margin
    const revB=safe(m.revenuePerShareTTM)*shares/1e3;
    const fcfRevBased=revB*(fcfM/100);
    if(fcfRevBased>0){
      fcf=fcfRevBased;
    }else{
      // FALLBACK 2: Use operating cash flow if available (total, then per share)
      const ocf=safe(m.operatingCashFlowAnnual)||safe(m.operatingCashFlowPerShareAnnual)*shares/1e3||0;
      const capex=safe(m.capitalExpenditureAnnual)||safe(m.capitalExpenditurePerShareAnnual)*shares/1e3||0;
      const fcfFromOCF=(ocf-capex)/1e9; // convert to billions
      if(fcfFromOCF>0){
        fcf=fcfFromOCF;
        fcfM=safe((fcfFromOCF/(safe(m.revenueTTM)||1))*100)||10;
      }else{
        // FALLBACK 3: Use revenue with conservative industry FCF margin (10%)
        const revTTM=safe(m.revenueTTM)/1e9||0; // to billions
        if(revTTM>0){
          fcfM=10; // conservative tech/general industry average
          fcf=revTTM*(fcfM/100);
        }else{
          // FALLBACK 4: Last resort — use net income as proxy (60% of net income)
          const ni=safe(m.netIncomeAnnual)/1e9||0;
          if(ni>0){
            fcfM=6;
            fcf=ni*0.6;
          }
        }
      }
    }
  }
  
  // If still no FCF, use price * 10% as emergency fallback (implies 10x P/FCF)
  if(fcf<=0){
    fcf=price*shares/1e3*0.10;
    fcfM=10;
  }
  
  let v=0;
  for(let yr=1;yr<=5;yr++){
    const g=revG/100*(1-yr*0.1);
    fcf*=(1+Math.max(g,0.005));
    v+=fcf/Math.pow(1+wacc/100,yr);
  }
  const termG=2.5;
  const denominator=Math.max((wacc/100)-(termG/100),0.01);
  const tv=(fcf*(1+termG/100))/denominator;
  v+=tv/Math.pow(1+wacc/100,5);
  
  if(!isFinite(v)||isNaN(v)||v<=0)return{intrinsic:price,upside:0,rating:'FAIRLY VALUED',wacc,revGrowth:parseFloat(revG.toFixed(1)),fcfMargin:parseFloat(fcfM.toFixed(1))};
  const intr=v*1000/safe(m.shareOutstanding);
  const intrCapped=Math.min(Math.max(intr,price*0.05),price*10);
  if(!isFinite(intrCapped)||intrCapped<=0)return{intrinsic:price,upside:0,rating:'FAIRLY VALUED',wacc,revGrowth:parseFloat(revG.toFixed(1)),fcfMargin:parseFloat(fcfM.toFixed(1))};
  const up=parseFloat(((intrCapped-price)/price*100).toFixed(1));
  return{intrinsic:parseFloat(intrCapped.toFixed(2)),upside:up,rating:up>20?'UNDERVALUED':up<-20?'OVERVALUED':'FAIRLY VALUED',wacc,revGrowth:parseFloat(revG.toFixed(1)),fcfMargin:parseFloat(fcfM.toFixed(1))};
}
function calcFlags(m){
  const f=[],p=[];
  if((m.revenueGrowthQuarterlyYoy||0)<0)f.push({title:'Revenue Declining',detail:`Down ${Math.abs(m.revenueGrowthQuarterlyYoy||0).toFixed(1)}% YoY.`});
  else if((m.revenueGrowthQuarterlyYoy||0)>10)p.push({title:'Strong Revenue Growth',detail:`+${(m.revenueGrowthQuarterlyYoy||0).toFixed(1)}% YoY.`});
  if((m.freeCashFlowPerShareTTM||0)<0)f.push({title:'Negative Free Cash Flow',detail:`FCF/sh $${(m.freeCashFlowPerShareTTM||0).toFixed(2)}.`});
  else p.push({title:'Positive Free Cash Flow',detail:`FCF/sh $${(m.freeCashFlowPerShareTTM||0).toFixed(2)}.`});
  const de=m.totalDebt/teq(m)||0;
  if(de>2)f.push({title:'High Leverage',detail:`D/E ${de.toFixed(2)}x.`});
  else if(de<.5)p.push({title:'Low Debt Load',detail:`D/E ${de.toFixed(2)}x — clean balance sheet.`});
  if((m.grossMarginAnnual||0)<15)f.push({title:'Thin Gross Margins',detail:`${(m.grossMarginAnnual||0).toFixed(1)}% gross margin.`});
  else if((m.grossMarginAnnual||0)>50)p.push({title:'Wide Gross Margins',detail:`${(m.grossMarginAnnual||0).toFixed(1)}% — strong pricing power.`});
  if((m.netProfitMarginAnnual||0)<0)f.push({title:'Unprofitable',detail:`Net margin ${(m.netProfitMarginAnnual||0).toFixed(1)}%.`});
  if((m.shortInterestRatio||0)>25)f.push({title:'Heavy Short Interest',detail:`${(m.shortInterestRatio||0).toFixed(1)}% short float.`});
  if(!f.length)f.push({title:'No Major Red Flags',detail:'Fundamentals look clean.'});
  if(!p.length)p.push({title:'Metrics Within Range',detail:'Key ratios are acceptable.'});
  return{flags:f,positives:p,riskLevel:f.some(x=>['Revenue Declining','High Leverage','Heavy Short Interest'].includes(x.title))?'HIGH':f.length>2?'MEDIUM':'LOW'};
}
function calcShort(m){const sp=m.shortInterestRatio||0,dtc=m.shortRatioAvgVol||(sp/10);return{shortPct:sp,dtc,trend:sp>20?'INCREASING':sp<8?'DECREASING':'STABLE',squeeze:dtc>5||sp>25?'HIGH':dtc>2||sp>15?'MEDIUM':'LOW'};}

function buildStock(ticker,rank,q,p,m){
  const price=q.c||q.pc||0; // use current price OR previous close after hours
  const chg=q.c?q.d||0:0;
  const pct=q.c?q.dp||0:0;
  const afterHours=!q.c&&q.pc>0;
  const mcv=m.marketCapitalization||0;
  const mc=mcv>=1e6?`$${(mcv/1e6).toFixed(2)}T`:mcv>=1e3?`$${(mcv/1e3).toFixed(1)}B`:mcv?`$${mcv.toFixed(0)}M`:'—';
  const pd=calcPillars(m),dd=calcDCF(m,price);
  return{rank,ticker,name:p.name||ticker,sector:p.finnhubIndustry||'Unknown',exch:p.exchange||'NASDAQ',
    price,chg,pct,afterHours,
    hi:`$${(q.h||q.pc||0).toFixed(2)}`,lo:`$${(q.l||q.pc||0).toFixed(2)}`,
    hi52:`$${(m['52WeekHigh']||0).toFixed(2)}`,lo52:`$${(m['52WeekLow']||0).toFixed(2)}`,
    vol:m.volumeTTM?`${(m.volumeTTM/1e6).toFixed(0)}M`:'—',
    avol:m['10DayAverageTradingVolume']?`${m['10DayAverageTradingVolume'].toFixed(1)}M`:'—',
    mc,pe:m.peBasicExclExtraTTM?m.peBasicExclExtraTTM.toFixed(1):'—',
    eps:m.epsBasicExclExtraItemsTTM?`$${m.epsBasicExclExtraItemsTTM.toFixed(2)}`:'—',
    rev:m.revenuePerShareTTM&&m.shareOutstanding?`$${((m.revenuePerShareTTM*m.shareOutstanding)/1e9).toFixed(1)}B`:'—',
    gm:m.grossMarginAnnual?`${m.grossMarginAnnual.toFixed(1)}%`:'—',
    beta:m.beta?m.beta.toFixed(2):'—',
    div:m.dividendYieldIndicatedAnnual?`${m.dividendYieldIndicatedAnnual.toFixed(2)}%`:'—',
    shortPct:m.shortInterestRatio||0,
    pillarsScore:`${pd.totalScore}/8`,dcfUpside:dd.upside,
    mentions:0,mentionsReal:false,sent:null,_m:m};
}

function genH(base,n,vol){let s=Math.floor(base*7919+n*31);const r=()=>{s=(s*16807+7)%2147483647;return(s-1)/2147483646;};let p=base*.87,o=[];for(let i=0;i<n;i++){p*=1+.00032+(r()-.478)*vol;o.push(+p.toFixed(2));}o[o.length-1]=base;return o;}
const PVOL={'1D':.003,'1W':.010,'1M':.018,'3M':.020,'6M':.022,'1Y':.025,'5Y':.035};
const PPTS={'1D':78,'1W':35,'1M':22,'3M':65,'6M':126,'1Y':252,'5Y':260};
const isPos=n=>n>=0,clr=n=>isPos(n)?'var(--gr)':'var(--re)',bgClr=n=>isPos(n)?'var(--grg)':'var(--reg)';
const fmtP=n=>n>=0?`+${n.toFixed(2)}%`:`${n.toFixed(2)}%`,fmtC=n=>n>=0?`+${n.toFixed(2)}`:`${n.toFixed(2)}`;
const SH=({label,color})=><div style={{fontSize:10,color:color||'var(--t3)',fontFamily:"'Syne',sans-serif",fontWeight:700,letterSpacing:'.09em',marginBottom:10}}>{label}</div>;
const Card=({children,accent,style:s})=><div style={{background:'var(--s1)',border:`1px solid ${accent?accent+'33':'var(--br)'}`,borderRadius:'var(--r)',padding:'13px 15px',...s}}>{children}</div>;
const SPill=({label,value,color})=><div style={{display:'flex',flexDirection:'column',alignItems:'center',background:'var(--s1)',border:'1px solid var(--br)',borderRadius:8,padding:'9px 6px',textAlign:'center',flex:1}}><div style={{fontSize:9,color:'var(--t3)',fontFamily:"'Syne',sans-serif",fontWeight:700,letterSpacing:'.07em',marginBottom:3}}>{label}</div><div style={{fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:700,color:color||'var(--t1)'}}>{value}</div></div>;
const AIB=({children})=><div style={{background:'var(--acg)',border:'1px solid rgba(0,200,255,.2)',borderRadius:'var(--r)',padding:'13px 15px',marginTop:10}}><div style={{fontSize:9,color:'var(--ac)',fontFamily:"'Syne',sans-serif",fontWeight:700,letterSpacing:'.09em',marginBottom:6}}>SUMMARY</div><div style={{fontSize:12,color:'var(--t2)',lineHeight:1.6}}>{children}</div></div>;
// SWS-style 5-axis Radar Chart (Snowflake)
const RadarChart=({scores,size=180})=>{
  const c=size/2,r=size/2-18;
  const axes=['VALUATION','GROWTH','HEALTH','PAST','DIVIDEND'];
  const vals=[scores.valuation,scores.growth,scores.health,scores.past,scores.dividend];
  const pt=(i,v)=>{const a=(i*72-90)*Math.PI/180;return[c+Math.cos(a)*(v/100)*r,c+Math.sin(a)*(v/100)*r];};
  const poly=vals.map((v,i)=>pt(i,v)).map(p=>p.join(',')).join(' ');
  const ideal=Array(5).fill(75).map((v,i)=>pt(i,v)).map(p=>p.join(',')).join(' ');
  return <svg viewBox={`0 0 ${size} ${size}`} style={{width:'100%',height:'auto'}}>
    {[25,50,75,100].map(p=><circle key={p} cx={c} cy={c} r={p/100*r} fill="none" stroke="var(--br)" strokeWidth="0.5" opacity="0.25"/>)}
    {axes.map((_,i)=>{const a=(i*72-90)*Math.PI/180;const x=c+Math.cos(a)*r,y=c+Math.sin(a)*r;return <line key={i} x1={c} y1={c} x2={x} y2={y} stroke="var(--br)" strokeWidth="0.5" opacity="0.2"/>;})}&nbsp;
    <polygon points={ideal} fill="var(--ac)" fillOpacity="0.08" stroke="var(--ac)" strokeWidth="0.5" strokeDasharray="2,2"/>
    <polygon points={poly} fill="var(--ac)" fillOpacity="0.25" stroke="var(--ac)" strokeWidth="1.5"/>
    {axes.map((lbl,i)=>{const a=(i*72-90)*Math.PI/180;const x=c+Math.cos(a)*(r+22),y=c+Math.sin(a)*(r+22);return <text key={lbl} x={x} y={y} textAnchor="middle" fontSize="9" fill="var(--t2)" fontWeight="700" fontFamily="'Syne',sans-serif">{lbl}</text>;})}&nbsp;
  </svg>;
};
const Spin=({label})=><div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'48px 0',gap:14}}><div style={{width:28,height:28,border:'2px solid var(--br2)',borderTopColor:'var(--ac)',borderRadius:'50%',animation:'spin .8s linear infinite'}}/><div style={{fontSize:11,color:'var(--t3)',fontFamily:"'Space Mono',monospace"}}>{label||'Loading live data…'}</div></div>;

function Chart({data,color,height=150}){
  const [tip,setTip]=useState(null);const ref=useRef();
  const W=600,H=height,iW=W-8,iH=H-10;
  const mn=Math.min(...data)*.998,mx=Math.max(...data)*1.002;
  const tx=i=>4+(i/(data.length-1))*iW,ty=v=>6+iH-((v-mn)/(mx-mn))*iH;
  const pts=data.map((v,i)=>`${tx(i)},${ty(v)}`).join(' ');
  const area=`M${tx(0)},${ty(data[0])} `+data.map((v,i)=>`L${tx(i)},${ty(v)}`).join(' ')+` L${tx(data.length-1)},${H} L${tx(0)},${H} Z`;
  const mv=e=>{const r=ref.current?.getBoundingClientRect();if(!r)return;const x=e.touches?e.touches[0].clientX:e.clientX;const idx=Math.min(Math.max(Math.round((x-r.left)/r.width*(data.length-1)),0),data.length-1);setTip({x:tx(idx),y:ty(data[idx]),val:data[idx]});};
  return <div style={{position:'relative',width:'100%',height}}>
    <svg ref={ref} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{width:'100%',height:'100%',display:'block'}} onMouseMove={mv} onMouseLeave={()=>setTip(null)} onTouchMove={e=>{e.preventDefault();mv(e);}} onTouchEnd={()=>setTip(null)}>
      <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={color} stopOpacity={.28}/><stop offset="95%" stopColor={color} stopOpacity={0}/></linearGradient></defs>
      <path d={area} fill="url(#cg)"/><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/>
      {tip&&<><line x1={tip.x} y1={6} x2={tip.x} y2={H} stroke={color} strokeWidth="1" strokeDasharray="3,3" opacity={.5}/><circle cx={tip.x} cy={tip.y} r={4} fill={color}/></>}
    </svg>
    {tip&&<div style={{position:'absolute',top:4,left:'50%',transform:'translateX(-50%)',background:'var(--s2)',border:'1px solid var(--br2)',borderRadius:6,padding:'2px 9px',fontFamily:"'Space Mono',monospace",fontSize:11,color:'var(--t1)',pointerEvents:'none',whiteSpace:'nowrap'}}>${tip.val.toFixed(2)}</div>}
  </div>;
}

function OvTab({s}){
  const hi=parseFloat((s.hi52||'$0').replace(/[$,]/g,'')),lo=parseFloat((s.lo52||'$0').replace(/[$,]/g,''));
  const pos=hi>lo?Math.min(Math.max(((s.price-lo)/(hi-lo))*100,0),100):50;
  const mx=[['Market Cap',s.mc],['P/E',s.pe],['EPS',s.eps],['52W Hi',s.hi52],['52W Lo',s.lo52],['Volume',s.vol],['Avg Vol',s.avol],['Revenue',s.rev],['Gross Margin',s.gm],['Beta',s.beta],['Dividend',s.div]];
  return <div style={{animation:'fadeUp .3s ease'}}>

function TenQTab({stock}){
  const [data,setData]=useState(null);const [ld,setLd]=useState(true);

    Promise.allSettled([
      fhGet(`/stock/earnings?symbol=${stock.ticker}`),
      fhGet(`/stock/recommendation?symbol=${stock.ticker}`),
    ]).then(([earn,rec])=>{
      setData({
        earnings:earn.status==='fulfilled'?(earn.value||[]).slice(0,4):[],
        recs:rec.status==='fulfilled'?(rec.value||[]).slice(0,1):[],
      });
    }).catch(()=>setData(null)).finally(()=>setLd(false));
  },[stock.ticker]);
  if(ld)return <Spin label="Fetching earnings data…"/>;

  const recC={'STRONG BUY':'var(--gr)','BUY':'var(--gr)','HOLD':'var(--go)','SELL':'var(--re)','STRONG SELL':'var(--re)'}[recLabel]||'var(--t2)';

        <div style={{display:'flex',gap:4}}>
          {[['SB',rec.strongBuy,'var(--gr)'],['B',rec.buy,'var(--gr)'],['H',rec.hold,'var(--go)'],['S',rec.sell,'var(--re)'],['SS',rec.strongSell,'var(--re)']].map(([l,v,c])=>v>0&&<div key={l} style={{textAlign:'center'}}><div style={{fontSize:9,color:'var(--t3)'}}>{l}</div><div style={{fontFamily:"'Space Mono',monospace",fontSize:13,fontWeight:700,color:c}}>{v}</div></div>)}
        </div>
      </div>
      {/* Consensus bar */}
      {totalAnalysts>0&&<div style={{height:6,borderRadius:3,overflow:'hidden',display:'flex'}}>
        {[[(rec.strongBuy||0)+(rec.buy||0),'var(--gr)'],[(rec.hold||0),'var(--go)'],[(rec.sell||0)+(rec.strongSell||0),'var(--re)']].map(([v,c],i)=>v>0&&<div key={i} style={{flex:v,background:c}}/>)}
      </div>}
    </Card>}
    {/* Quarterly earnings */}

      <SH label="QUARTERLY EARNINGS (EPS)"/>
      {data.earnings.map((e,i)=>{
        const beat=e.actual!=null&&e.estimate!=null&&e.actual>e.estimate;
        const miss=e.actual!=null&&e.estimate!=null&&e.actual<e.estimate;
        const surprise=e.actual!=null&&e.estimate!=null?((e.actual-e.estimate)/Math.abs(e.estimate)*100):null;
        return <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingBottom:i<data.earnings.length-1?10:0,marginBottom:i<data.earnings.length-1?10:0,borderBottom:i<data.earnings.length-1?'1px solid var(--br)':'none'}}>

          </div>

            {surprise!=null&&<div style={{padding:'2px 8px',borderRadius:4,background:beat?'var(--grg)':miss?'var(--reg)':'var(--s3)',fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700,color:beat?'var(--gr)':miss?'var(--re)':'var(--t3)'}}>{beat?'✓ BEAT':miss?'✗ MISS':'IN LINE'} {surprise!=null?`${surprise>0?'+':''}${surprise.toFixed(1)}%`:''}</div>}

    if(stocks.length>0){
      const top=stocks[0];
      if(prevNo1.current&&prevNo1.current!==top.ticker){
        setToast({ticker:top.ticker,name:top.name});
        setTimeout(()=>setToast(null),6000);
      }
      prevNo1.current=top.ticker;
    }
  },[stocks]);

  const loadAll=useCallback(async()=>{
    setLoading(true);
    // 1. Try live social trending from StockTwits
    const social=await fetchSocialTrending();
    const tickers=social?social.map(s=>s.ticker).slice(0,10):DEFAULT_WATCHLIST;
    const mentionMap={};
    if(social) social.forEach(s=>{if(s.mentions!==null) mentionMap[s.ticker]=s.mentions;});
    setSocialLive(!!social);
    setTrendSource(social?'StockTwits':'Default watchlist');
    // 2. Fetch Finnhub quote+profile+metrics for each
    const results=await Promise.allSettled(tickers.map(t=>fetchStock(t)));
    const built=results.map((r,i)=>{
      if(r.status!=='fulfilled')return null;
      const {q,p,m}=r.value;
      const price=q.c||q.pc||0;
      if(!price)return null;
      const s=buildStock(tickers[i],i+1,q,p,m);
      if(mentionMap[tickers[i]]){s.mentions=mentionMap[tickers[i]];s.mentionsReal=true;}
      return s;
    }).filter(Boolean).sort((a,b)=>b.mentions-a.mentions).map((s,i)=>({...s,rank:i+1}));
    // Detect market open (any stock has live c price > 0)
    const open=results.some(r=>r.status==='fulfilled'&&r.value.q.c>0);
    setMarketOpen(open);
    setStocks(built);setLastUp(new Date());setCdown(REFRESH_SEC);
    setLoading(false);
  },[]);

  const handleLookup=async()=>{
    const ticker=q.trim().toUpperCase();
    if(!ticker)return;
    setSearching(true);setSearchErr('');
    try{
      const {q:qt,p,m}=await fetchStock(ticker);
      const price=qt.c||qt.pc||0;
      if(!price){setSearchErr(`"${ticker}" not found on Finnhub. Check the ticker symbol.`);setSearching(false);return;}
      const s=buildStock(ticker,0,qt,p,m);
      setStock(s);setQ('');
    }catch(e){setSearchErr(`Could not fetch "${ticker}". Check the ticker symbol.`);}
    setSearching(false);
  };

  useEffect(()=>{loadAll();},[loadAll]);
  useEffect(()=>{
    const t=setInterval(()=>setCdown(c=>{if(c<=1){loadAll();return REFRESH_SEC;}return c-1;}),1000);
    return()=>clearInterval(t);
  },[loadAll]);

  const maxM=stocks[0]?.mentions||1;
  const byS=sec==='All'?stocks:stocks.filter(s=>s.sector===sec);
  const fil=q.trim()?byS.filter(s=>s.ticker.toLowerCase().includes(q.toLowerCase())||s.name.toLowerCase().includes(q.toLowerCase())):byS;
  const noMatch=q.trim().length>=1&&fil.length===0;
  const today=new Date().toLocaleDateString([],{month:'short',day:'numeric'}).toUpperCase();
  const time=lastUp?lastUp.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'—';
  const statusColor=marketOpen?'var(--gr)':'var(--go)';
  const statusBg=marketOpen?'var(--grg)':'var(--gog)';
  const statusBorder=marketOpen?'rgba(14,206,135,.3)':'rgba(245,158,11,.3)';
  const statusLabel=loading?'LOADING…':marketOpen?'MARKET OPEN':'AFTER HOURS';

  if(stock)return <Detail stock={stock} onBack={()=>setStock(null)}/>;
  return <div className="dot" style={{minHeight:'100vh',display:'flex',flexDirection:'column',position:'relative'}}>
    {/* 🔔 New #1 toast notification */}
    {toast&&<div style={{position:'fixed',top:14,left:'50%',transform:'translateX(-50%)',zIndex:999,background:'linear-gradient(135deg,var(--ac),#0070f3)',color:'#000',borderRadius:10,padding:'10px 18px',fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,boxShadow:'0 4px 24px rgba(0,200,255,.35)',display:'flex',alignItems:'center',gap:8,animation:'fadeUp .3s ease',whiteSpace:'nowrap'}}>
      🔔 NEW #1 &nbsp;<span style={{fontFamily:"'Space Mono',monospace"}}>{toast.ticker}</span>&nbsp;is now trending!
      <button onClick={()=>setToast(null)} style={{marginLeft:4,fontSize:14,color:'#000',opacity:.6,fontWeight:700}}>×</button>
    </div>}
    <div style={{padding:'14px 13px 0',background:'linear-gradient(180deg,rgba(0,200,255,.06) 0%,transparent 100%)',borderBottom:'1px solid var(--br)'}}>
      <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',gap:7,flex:1}}>
          <div style={{width:32,height:32,borderRadius:8,background:'linear-gradient(135deg,var(--ac),#0070f3)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,color:'#000',flexShrink:0}}>B</div>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:700,letterSpacing:'-.02em'}}>buzz<span style={{color:'var(--ac)'}}>stock</span></div>
            <div style={{fontSize:8,color:'var(--t3)',fontFamily:"'Space Mono',monospace",letterSpacing:'.06em'}}>{socialLive?'🔥 StockTwits Trending':'📋 Default Watchlist'}</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{padding:'4px 8px',borderRadius:6,background:statusBg,border:`1px solid ${statusBorder}`,display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:statusColor,animation:marketOpen?'blink 2s infinite':'none'}}/>
            <span style={{fontSize:7,fontFamily:"'Space Mono',monospace",color:statusColor,fontWeight:700,whiteSpace:'nowrap'}}>{statusLabel}</span>
            {!loading&&<span style={{fontSize:7,fontFamily:"'Space Mono',monospace",color:'var(--t3)'}}>:{String(countdown).padStart(2,'0')}</span>}
          </div>
          <button onClick={loadAll} style={{width:26,height:26,borderRadius:6,background:'var(--s2)',border:'1px solid var(--br)',color:'var(--t2)',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center'}} title="Refresh">⟳</button>
        </div>
      </div>

      {/* Search */}
      <div style={{position:'relative',marginBottom:noMatch||searchErr?8:10}}>
        <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--t3)',fontSize:15,pointerEvents:'none'}}>⌕</span>
        <input value={q} onChange={e=>{setQ(e.target.value);setSearchErr('');}}
          onKeyDown={e=>e.key==='Enter'&&(noMatch||q.trim().length>0&&!fil.length)&&handleLookup()}
          placeholder="Search any ticker — ASML, SMCI, TSM, MSTR…"
          style={{width:'100%',padding:'10px 13px 10px 36px',background:'var(--s1)',border:'1px solid var(--br)',borderRadius:8,color:'var(--t1)',fontSize:13}}
          onFocus={e=>e.target.style.borderColor='var(--ac)'} onBlur={e=>e.target.style.borderColor='var(--br)'}/>
      </div>
      {noMatch&&!searchErr&&<div style={{marginBottom:10,display:'flex',alignItems:'center',gap:10,padding:'10px 13px',background:'var(--acg)',border:'1px solid rgba(0,200,255,.25)',borderRadius:8}}>
        <span style={{fontSize:12,color:'var(--t2)',flex:1}}><span style={{color:'var(--ac)',fontFamily:"'Space Mono',monospace",fontWeight:700}}>{q.toUpperCase()}</span> not in trending list — fetch live from Finnhub?</span>
        <button onClick={handleLookup} disabled={searching} style={{padding:'6px 14px',borderRadius:6,background:'var(--ac)',color:'#000',fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:11,whiteSpace:'nowrap',opacity:searching?0.6:1,flexShrink:0}}>{searching?'Loading…':'Look up'}</button>
      </div>}
      {searchErr&&<div style={{marginBottom:10,padding:'10px 13px',background:'var(--reg)',border:'1px solid rgba(244,63,94,.3)',borderRadius:8,fontSize:12,color:'var(--re)'}}>{searchErr}</div>}

      {/* Market status bar */}
      {!loading&&<div style={{display:'flex',alignItems:'center',gap:7,marginBottom:8}}>
        <span style={{fontFamily:"'Syne',sans-serif",fontSize:10,fontWeight:700,color:'var(--t2)',letterSpacing:'.1em'}}>🔥 MOST BUZZED</span>
        <span style={{fontSize:10,color:'var(--t3)',fontFamily:"'Space Mono',monospace"}}>· {time}</span>
        {!marketOpen&&<span style={{fontSize:9,color:'var(--go)',fontFamily:"'Space Mono',monospace",background:'var(--gog)',padding:'1px 6px',borderRadius:4}}>PREV CLOSE — Live resumes market open</span>}
        <span style={{marginLeft:'auto',fontSize:9,color:'var(--t3)',fontFamily:"'Space Mono',monospace"}}>↻ {countdown}s</span>
      </div>}

      {stocks.length>0&&<Pills stocks={stocks} sel={sec} onSel={s=>{setSec(s);setQ('');}}/>}
    </div>

    <div style={{padding:'8px 10px 0',flex:1}}>
      {loading&&stocks.length===0
        ?<div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'48px 0',gap:14}}>
            <div style={{width:28,height:28,border:'2px solid var(--br2)',borderTopColor:'var(--ac)',borderRadius:'50%',animation:'spin .8s linear infinite'}}/>
            <div style={{fontSize:11,color:'var(--t3)',fontFamily:"'Space Mono',monospace"}}>Fetching trending stocks from StockTwits…</div>
          </div>
        :fil.length===0&&!noMatch
          ?<div style={{textAlign:'center',padding:'36px 0',color:'var(--t3)',fontSize:12}}>No stocks in this sector.</div>
          :fil.map((s,i)=><Row key={s.ticker} s={s} maxM={maxM} delay={i*.04} onSel={setStock}/>)
      }
    </div>
    <div style={{borderTop:'1px solid var(--br)',padding:'10px 13px',background:'var(--s1)',fontSize:9,color:'var(--t3)',textAlign:'center',fontFamily:"'Space Mono',monospace"}}>
      Trending via StockTwits · Prices via Finnhub · Auto-refresh {REFRESH_SEC}s · Personal use
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
